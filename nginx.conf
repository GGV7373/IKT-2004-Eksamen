events {}

http {
    # Admin-subnet (VLAN 20)
    geo $is_admin {
        default         0;
        192.168.20.0/24 1;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Blokkerer /admin for alle unntatt VLAN 20 (192.168.20.0/24)
        location /admin {
            if ($is_admin = 0) {
                return 403;
            }
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Alle andre sider er åpne
        location / {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
